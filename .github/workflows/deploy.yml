name: Deploy Vite to GitHub Pages

on:
  push:
    branches: [ main ] # あなたがmainに保存（コミット）した瞬間に動きます

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Viteが自動生成したビルドID付きのフォルダを回収します

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
