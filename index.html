<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会計システム Halo</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- ============================
         左サイドバー（Netsuite風）
    ============================= -->
    <aside class="sidebar">
        <div class="sidebar-logo">Halo</div>

        <nav class="sidebar-nav">
            <ul>
                <li><a href="#journal-input">仕訳入力</a></li>
                <li><a href="#trial-balance">試算表</a></li>
                <li><a href="#">総勘定元帳</a></li>
                <li><a href="#">設定</a></li>
            </ul>
        </nav>
    </aside>

    <!-- ============================
         メインコンテンツ
    ============================= -->
    <main class="main-content">

        <!-- 仕訳入力フォーム（カード） -->
        <section id="journal-input" class="card">
            <h2 class="card-title">仕訳入力</h2>

            <div class="input-row">
                <label>日付</label>
                <input type="date" id="je-date">
            </div>

            <div class="input-row">
                <label>借方科目</label>
                <input type="text" id="je-debit-account">
                <label>金額</label>
                <input type="number" id="je-debit-amount">
            </div>

            <div class="input-row">
                <label>貸方科目</label>
                <input type="text" id="je-credit-account">
                <label>金額</label>
                <input type="number" id="je-credit-amount">
            </div>

            <button id="save-journal" class="primary-btn">仕訳を保存</button>
        </section>

        <!-- 試算表（カード＋テーブル） -->
        <section id="trial-balance" class="card">
            <h2 class="card-title">試算表</h2>

            <table class="tb-table">
                <thead>
                    <tr>
                        <th>科目</th>
                        <th>借方合計</th>
                        <th>貸方合計</th>
                    </tr>
                </thead>
                <tbody id="tb-body">
                    <!-- JavaScriptで追加 -->
                </tbody>
            </table>
        </section>

    </main>

    <script src="assets/js/app.js"></script>
</body>
</html>
